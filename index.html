<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>3D 캡슐 인형뽑기</title>

<link rel="stylesheet" href="style.css">

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.170.0/build/three.module.js"
  }
}
</script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

</head>

<body>

<div id="loading">
  로딩중...
</div>

<div id="game"></div>

<div id="ui">

  <div id="coinBox">
    코인 :
    <span id="coin">999</span>
  </div>

  <div id="joystick">
    <div id="stick"></div>
  </div>

  <button id="dropBtn">
    집게
  </button>

</div>

<div id="resultModal">

  <div id="resultCard">

    <h2>🎉 당첨!</h2>

    <img
      id="resultImage"
      src=""
      alt="상품 이미지"
    >

    <h3 id="resultName"></h3>

    <div id="qrcode"></div>

    <button id="shareBtn">
      공유하기
    </button>

    <button id="closeBtn">
      닫기
    </button>

  </div>

</div>

<script type="module" src="./app.js"></script>

</body>
</html>
