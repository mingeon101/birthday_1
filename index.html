<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>3D 캡슐 인형뽑기</title>

<link rel="stylesheet" href="style.css">

<script type="module" src="https://www.gstatic.com/firebasejs/11.10.0/firebase-app.js"></script>
<script type="module" src="https://www.gstatic.com/firebasejs/11.10.0/firebase-database.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

<style>
html,body{
margin:0;
padding:0;
overflow:hidden;
background:black;
font-family:sans-serif;
}

#game{
position:fixed;
left:0;
top:0;
width:100%;
height:100%;
}

#loading{
position:fixed;
left:0;
top:0;
width:100%;
height:100%;
display:flex;
align-items:center;
justify-content:center;
background:black;
color:white;
font-size:24px;
z-index:999;
}

#ui{
position:fixed;
left:0;
top:0;
width:100%;
height:100%;
pointer-events:none;
}

#coinBox{
position:absolute;
top:20px;
left:20px;
background:rgba(0,0,0,.6);
padding:10px;
border-radius:10px;
color:white;
font-size:20px;
}

#dropBtn{
position:absolute;
right:20px;
bottom:120px;

width:100px;
height:100px;

border:none;
border-radius:50%;

background:#ff4444;
color:white;
font-size:20px;

pointer-events:auto;
}

#joystick{
position:absolute;
left:20px;
bottom:20px;

width:140px;
height:140px;

border-radius:50%;
background:rgba(255,255,255,.15);

pointer-events:auto;
}

#stick{
position:absolute;
left:45px;
top:45px;

width:50px;
height:50px;

border-radius:50%;
background:white;
}

#resultModal{
display:none;

position:fixed;
left:0;
top:0;

width:100%;
height:100%;

background:rgba(0,0,0,.85);

justify-content:center;
align-items:center;

z-index:10000;
}

#resultCard{
width:320px;

background:white;

border-radius:20px;

padding:20px;

text-align:center;
}

#resultImage{
width:200px;
height:200px;
object-fit:cover;
border-radius:10px;
}

#qrcode{
margin-top:15px;
display:flex;
justify-content:center;
}

#shareBtn{
margin-top:20px;

padding:12px 20px;

border:none;

border-radius:10px;

background:#2196f3;

color:white;

font-size:18px;
}
</style>
</head>

<body>

<div id="loading">
로딩중...
</div>

<div id="game"></div>

<div id="ui">

<div id="coinBox">
코인 : <span id="coin">999</span>
</div>

<div id="joystick">
<div id="stick"></div>
</div>

<button id="dropBtn">
집게
</button>

</div>

<div id="resultModal">

<div id="resultCard">

<h2>🎉 당첨</h2>

<img id="resultImage">

<h3 id="resultName"></h3>

<div id="qrcode"></div>

<button id="shareBtn">
공유하기
</button>

</div>

</div>

<script type="module" src="firebase.js"></script>
<script type="module" src="app.js"></script>

</body>
</html>
